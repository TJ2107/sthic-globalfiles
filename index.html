    <style>
      /* Style minimal pour éviter le flash blanc avant le chargement du CSS */
      body { background-color: #f3f4f6; margin: 0; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
    <script>
      // Suppress benign Vite WebSocket errors
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('[vite] failed to connect to websocket') || args[0].includes('WebSocket closed without opened'))) {
            return;
          }
          originalError.apply(console, args);
        };
        console.warn = function(...args) {
          if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
            return;
          }
          originalWarn.apply(console, args);
        };
        window.addEventListener('unhandledrejection', function(event) {
          const reasonStr = event.reason ? (event.reason.message || String(event.reason)) : '';
          if (reasonStr.includes('WebSocket closed without opened') || reasonStr.includes('failed to connect to websocket')) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        });
        window.addEventListener('error', function(event) {
          const errMsg = event.message || '';
          if (errMsg.includes('[vite] failed to connect to websocket') || errMsg.includes('WebSocket closed without opened')) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
<link rel="stylesheet" href="/index.css">
